<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Design.md - Gallery</title>
  <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">A</div>
      <div>
        <h1 class="header-title">Awesome Design.md</h1>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="search-container">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search designs..."
          aria-label="Search designs"
        >
      </div>

      <nav class="categories">
        <h2 class="categories-title">Categories</h2>
        <ul class="category-list">
          <li class="category-item">
            <button class="category-btn active" data-category="all">
              <span>All Designs</span>
              <span class="count" id="countAll">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="AI & Machine Learning">
              <span>AI & ML</span>
              <span class="count" id="countAI">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Developer Tools & Platforms">
              <span>Developer Tools</span>
              <span class="count" id="countDev">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Infrastructure & Cloud">
              <span>Infrastructure</span>
              <span class="count" id="countInfra">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Design & Productivity">
              <span>Design</span>
              <span class="count" id="countDesign">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Fintech & Crypto">
              <span>Fintech</span>
              <span class="count" id="countFintech">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Enterprise & Consumer">
              <span>Enterprise</span>
              <span class="count" id="countEnterprise">0</span>
            </button>
          </li>
          <li class="category-item">
            <button class="category-btn" data-category="Car Brands">
              <span>Car Brands</span>
              <span class="count" id="countCar">0</span>
            </button>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="toolbar">
        <div class="results-info">
          <span id="resultsCount">0 designs</span>
        </div>
        <div class="theme-toggle-pills" id="themeToggle">
          <button class="theme-pill active" data-theme="light">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            Light
          </button>
          <button class="theme-pill" data-theme="dark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            Dark
          </button>
        </div>
      </div>
      <div class="designs-grid" id="designsGrid">
        <!-- Design cards will be inserted here -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Design Name</h2>
        <button class="modal-close" id="modalClose" aria-label="Close modal">×</button>
      </div>

      <div class="modal-body">
        <!-- 左侧 Tab 导航 -->
        <nav class="modal-tabs">
          <button class="tab-btn active" data-tab="preview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
            Preview
          </button>
          <button class="tab-btn" data-tab="colors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="13.5" cy="6.5" r="2.5"></circle>
              <circle cx="17.5" cy="10.5" r="2.5"></circle>
              <circle cx="8.5" cy="7.5" r="2.5"></circle>
              <circle cx="6.5" cy="12.5" r="2.5"></circle>
              <path d="M12 22c-4.97 0-9-2.24-9-5v-1c0-2.76 4.03-5 9-5s9 2.24 9 5v1c0 2.76-4.03 5-9 5z"></path>
            </svg>
            Colors
          </button>
          <button class="tab-btn" data-tab="fonts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 7 4 4 20 4 20 7"></polyline>
              <line x1="9" y1="20" x2="15" y2="20"></line>
              <line x1="12" y1="4" x2="12" y2="20"></line>
            </svg>
            Fonts
          </button>
          <button class="tab-btn" data-tab="design">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            DESIGN.md
          </button>
        </nav>

        <!-- 右侧内容区域 -->
        <div class="modal-content-area">
          <div class="tab-content active" id="tabPreview">
            <iframe class="preview-iframe" id="previewIframe" src=""></iframe>
          </div>

          <div class="tab-content" id="tabColors">
            <div class="colors-grid" id="colorsGrid">
              <!-- Color swatches will be inserted here -->
            </div>
          </div>

          <div class="tab-content" id="tabFonts">
            <div class="fonts-list" id="fontsList">
              <!-- Font information will be inserted here -->
            </div>
          </div>

          <div class="tab-content" id="tabDesign">
            <div class="design-md-wrapper">
              <button class="copy-btn" id="copyDesignMd" title="Copy to clipboard">
                <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </button>
              <div class="design-md-content" id="designMdContent">
                <p>Loading DESIGN.md...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/design-data.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
